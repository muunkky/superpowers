metadata:
  maintained_by: muunkky/superpowers fork (tracking obra/superpowers upstream)
  review_frequency: Monthly
  related_docs:
    - docs/README.md
    - https://github.com/obra/superpowers/issues
    - https://github.com/obra/superpowers/pulls
  tools:
    roadmap_tracking: roadmap.yaml
    task_tracking: gitban cards
    Gitban_mcp: https://github.com/muunkky/gitban-mcp
milestones:
  m1:
    id: m1
    title: Superpowers 6.x — Cross-Harness Agentic SDLC
    description: 'Upstream (obra/superpowers) development landscape, mirrored from
      PR + issue history so this fork can track where the project is going and pick
      where to contribute. Status reflects UPSTREAM reality: done = merged PR, in_progress
      = open PR in flight, todo = open issue/request. Seeded 2026-07-10 from 131 merged
      PRs, 161 open PRs, 150 open issues.'
    status: in_progress
    start_date: '2026-07-10'
    target_completion: '2026-12-31'
    stories:
      s1:
        id: s1
        title: 'S1: Harness Portability'
        description: Run Superpowers on every agent runtime and OS. The single
          largest cluster of upstream activity — Codex, Windows hooks, and a
          long tail of requested harnesses.
        status: in_progress
        success_criteria:
          - Bootstrap auto-loads on session start for each supported harness
          - Windows hook execution robust across path/shell edge cases
          - New-harness onboarding is documented and repeatable
        projects:
          codex-integration:
            id: codex-integration
            title: Codex integration
            description: 'Native Codex plugin: hooks, skill discovery, marketplace
              packaging, subagent lifecycle.'
            status: in_progress
            sequence: 1
            features:
              codex-native-integration:
                id: codex-native-integration
                title: Native Codex plugin hooks + skill discovery
                description: 'Migrate from bootstrap CLI to native skill discovery
                  and native plugin hooks; marketplace manifest. PRs #540, #430, #1829,
                  #1876, #1877.'
                status: done
                sequence: 1
                docs_ref: https://github.com/obra/superpowers/pull/1876
              codex-sessionstart-stability:
                id: codex-sessionstart-stability
                title: Codex SessionStart hook stability
                description: 'Stop the SessionStart bootstrap re-firing on resume;
                  suppress empty-hooks auto-discovery. PRs #1838, #1879, #1880, #1897.'
                status: done
                sequence: 2
                docs_ref: https://github.com/obra/superpowers/pull/1897
              codex-deferred-tools-docs:
                id: codex-deferred-tools-docs
                title: Document Codex deferred tool mapping
                description: 'Document deferred subagent tool discovery/mapping for
                  Codex. PRs #1926, #1928, #1662.'
                status: in_progress
                sequence: 3
                docs_ref: https://github.com/obra/superpowers/pull/1928
              codex-subagent-lifecycle:
                id: codex-subagent-lifecycle
                title: Codex subagent lifecycle
                description: 'Close completed subagents after results consumed; fix
                  ChatGPT 5.6 subagent behaviour. Issues #1927, #1960.'
                status: todo
                sequence: 4
                docs_ref: https://github.com/obra/superpowers/issues/1960
              codex-windows-sandbox:
                id: codex-windows-sandbox
                title: Codex hook on Windows sandbox
                description: 'SessionStart hook fails on Windows when run-hook.cmd
                  invokes Git Bash; plugin hook does not execute on Codex app. Issues
                  #1867, #1827.'
                status: todo
                sequence: 5
                docs_ref: https://github.com/obra/superpowers/issues/1867
            summary: 'Making Superpowers work under the OpenAI Codex CLI/app harness:
              SessionStart hook registration, portal packaging, deferred-tool discovery,
              subagent lifecycle. Core integration shipped; remaining open items are
              Windows-specific Codex hook failures and doc/behaviour refinements.'
            cluster: 'Shipped PRs: #1876/#1877/#1879/#1880 (arittr, merged), release
              #1897 (obra, merged, v6.1.1). Open docs PRs: #1928/#1926 (2023Anita),
              #1662. Open issues: #1927 (close subagents), #1960 (GPT-5.6 subagent
              break), #1867/#1827 (Windows Codex hook fail).'
            signal: 'AVOID for core: maintainer obra owns/ships Codex (release #1897
              merged, arittr fixes merged). Remaining open items are issues + community
              docs PRs. #1867/#1827 are really Windows-hook bugs. Shipped-in v6.1.1.'
            context_captured: '2026-07-10'
          windows-hook-robustness:
            id: windows-hook-robustness
            title: Windows hook robustness
            description: Make plugin hook execution reliable across Windows
              path, shell, and username edge cases.
            status: in_progress
            sequence: 2
            features:
              windows-hook-execution:
                id: windows-hook-execution
                title: Core Windows hook execution
                description: 'SessionStart hook execution + polyglot wrapper for Windows/PowerShell/MSYS2.
                  PRs #1054, #523, #331, #134, #428, #427.'
                status: done
                sequence: 1
                docs_ref: https://github.com/obra/superpowers/pull/1054
              git-bash-discovery:
                id: git-bash-discovery
                title: Per-user Git Bash discovery
                description: 'Discover per-user Git install (%LOCALAPPDATA%) and skip
                  the WSL bash stub. PR #1864, issue #1863.'
                status: in_progress
                sequence: 2
                docs_ref: https://github.com/obra/superpowers/pull/1864
              paren-path-regression:
                id: paren-path-regression
                title: Parenthesis-in-path hook failure
                description: "SessionStart hook fails when plugin path contains '('
                  — regression variant of #51. Issue #1918."
                status: todo
                sequence: 3
                docs_ref: https://github.com/obra/superpowers/issues/1918
              powershell-invocation-edges:
                id: powershell-invocation-edges
                title: PowerShell invocation edge cases
                description: 'run-hook.cmd under PowerShell needs call operator; VS
                  Code Copilot syntax error; usernames with spaces; node loader error.
                  Issues #1751, #1225, #1142, #1554.'
                status: todo
                sequence: 4
                docs_ref: https://github.com/obra/superpowers/issues/1751
            summary: 'Chronic SessionStart hook failures on Windows: run-hook.cmd
              breaks when the plugin/profile path contains a space or parenthesis
              (cmd.exe word-splitting), under PowerShell (missing call operator),
              under Git Bash/WSL stub, and in Cursor/Codex. The single most-reported
              problem in the repo (#51 reported ~29 times).'
            cluster: 'Open PR #1864 (citizen204, per-user Git Bash / skip WSL stub).
              Related open PRs #1226 (VS Code Copilot), #1753 (docs). Open issues
              #1918 (paren regression on 6.1.1), #1751 (PowerShell call operator),
              #1142/#1225/#1554. Canonical #51 (space in path). No obra-authored fix
              PR for the core path-parsing bug.'
            signal: 'CONTESTED (1 community fix PR #1864, unmerged) but NOT maintainer-owned.
              Severity HIGH — chronic, ~29 reports, active 6.1.1 regression #1918.
              Genuine gap: no PR cleanly fixes the paren/space cmd.exe parsing. Viable
              target IF differentiated from #1864 and covers paren case. NOTE: Windows
              repro — hard to verify on Linux.'
            context_captured: '2026-07-10'
          new-harness-onboarding:
            id: new-harness-onboarding
            title: New-harness onboarding
            description: Documented, repeatable path to add a new agent runtime,
              plus the long tail of requested harnesses.
            status: in_progress
            sequence: 3
            features:
              harness-porting-guide:
                id: harness-porting-guide
                title: Porting-to-new-harness guide
                description: "'Porting Superpowers to a New Harness' guide + agent-neutral,
                  source-verified per-runtime tool refs. PRs #1656, #1486."
                status: done
                sequence: 1
                docs_ref: https://github.com/obra/superpowers/pull/1656
              established-harnesses:
                id: established-harnesses
                title: Established harness support
                description: 'Shipped: OpenCode, Cursor, Kimi Code, Factory Droid,
                  Antigravity, Gemini CLI, Pi. PRs #1673, #1657, #1137, #1079, #467,
                  #330, #1499.'
                status: done
                sequence: 2
                docs_ref: https://github.com/obra/superpowers/pull/1657
              hermes-harness:
                id: hermes-harness
                title: Hermes Agent harness
                description: 'Native Hermes Agent harness with on_session_start bootstrap
                  injection. PRs #1922, #1892, #1861, #881; issues #1859, #1581.'
                status: in_progress
                sequence: 3
                docs_ref: https://github.com/obra/superpowers/pull/1922
              requested-harnesses:
                id: requested-harnesses
                title: Requested harness long-tail
                description: 'Open requests/PRs: Qwen Code, Trae, Junie, Kiro, DeepSeek
                  TUI, Qoder, CodeBuddy, Continue, Crush, Mistral Vibe, ECA, Grok
                  CLI, oh-my-pi, OpenClaw, Lingma, Qodercli, Kilocode. Issues/PRs
                  #1136, #776, #1822, #503, #1587, #1148, #1500, #302, #580, #1024,
                  #1686, #1919, #1941, #641, #1262.'
                status: todo
                sequence: 4
                docs_ref: https://github.com/obra/superpowers/issues/503
            summary: Long tail of requests/PRs to add new agent harnesses
              (Hermes, ECA, Junie, Copilot, etc.) plus the general onboarding
              pattern of loading the using-superpowers bootstrap at session
              start so skills auto-trigger. Each new harness requires an
              end-to-end acceptance-test transcript per CLAUDE.md.
            cluster: 'Hermes: THREE competing open PRs #1922 (kumarabd), #1892 (pandaliu00),
              #1861 (pixeru). Other open harness PRs: #1686 (ECA), #1477 (Junie),
              #1226 (Copilot). Cited #1656/#1486/#1673/#1919/#1941 are open harness
              requests. No obra-authored harness PR.'
            signal: "AVOID Hermes — CONTESTED (3 competing PRs). Other harnesses each
              already have 1 open PR (ECA #1686, Junie #1477). Not maintainer-owned
              but crowded; any new-harness PR MUST include the 'react todo list' acceptance
              transcript or it's closed. TARGET only for an un-PR'd harness."
            context_captured: '2026-07-10'
          gemini-support-churn:
            id: gemini-support-churn
            title: Gemini CLI support churn
            description: 'Notable saga: Gemini CLI support removed as EOLed, then
              reverted/restored after user pushback.'
            status: done
            sequence: 4
            features:
              gemini-cli-lifecycle:
                id: gemini-cli-lifecycle
                title: Remove-then-restore Gemini CLI
                description: 'Removed Gemini CLI support (#1846) then reverted the
                  removal (#1959); tracked by request #1954.'
                status: done
                sequence: 1
                docs_ref: https://github.com/obra/superpowers/pull/1959
            summary: "Whiplash over Gemini CLI support: maintainer removed it believing
              Google EOL'd it, then the community pushed back that gemini-cli is still
              supported and the only harness available in many enterprise environments,
              and it was reverted/restored."
            cluster: '#1846 (obra, merged 2026-06-25, remove). #1959 (ada-sen, merged
              2026-07-10, revert/restore). #1954 (richard-morton, open issue requesting
              restore, enterprise lock-out).'
            signal: "AVOID — already RESOLVED. Removal #1846 reverted by merged #1959
              on 2026-07-10. Nothing to contribute; #1954's request is satisfied (issue
              may just need closing). Shipped-in: reverted via #1959."
            context_captured: '2026-07-10'
          non-git-vcs:
            id: non-git-vcs
            title: Non-git VCS support
            description: Support version-control systems beyond git, and degrade
              gracefully with none.
            status: todo
            sequence: 5
            features:
              jj-vcs-support:
                id: jj-vcs-support
                title: Jujutsu (jj) VCS support
                description: "Add jj VCS support alongside git; handle no-VCS repos.
                  PR #1138, issue #1140, plus 'skills should not specify git workflows'
                  #1856."
                status: in_progress
                sequence: 1
                docs_ref: https://github.com/obra/superpowers/pull/1138
            summary: 'Requests to decouple Superpowers from hard git assumptions:
              add Jujutsu (jj) VCS support, handle projects with no git/VCS at all,
              and stop skills from prescribing git-specific workflows. Touches deliberately-tuned
              skill content.'
            cluster: 'Open PR #1138 (zachthieme, add jj alongside git, not draft,
              unmerged). Open issues #1140 (No git or VCS), #1856 (skills should not
              specify git workflows). No obra-authored PR; no competing PRs.'
            signal: "MIXED. jj support CONTESTED-lite — open PR #1138 already attempts
              it; don't duplicate. Broader git-decoupling (#1856/#1140) un-contested
              and un-PR'd BUT high-risk: rewrites tuned skill content requiring extensive
              eval evidence. Not maintainer-owned. Proceed only with evals."
            context_captured: '2026-07-10'
        sequence: 1
      s2:
        id: s2
        title: 'S2: Subagent-Driven Development Hardening'
        description: Make the core multi-agent execution engine (SDD) safe,
          isolated, cost-aware, and honest. The densest cluster of open bugs and
          in-flight PRs upstream.
        status: in_progress
        sequence: 2
        success_criteria:
          - Concurrent runs on one checkout never collide on scratch artifacts
          - Dispatch decisions match task size and effort
          - Reviews cannot pass on unchanged or no-op work
        projects:
          workspace-isolation:
            id: workspace-isolation
            title: Workspace isolation
            description: Stop SDD scratch artifacts (.superpowers/sdd) from
              colliding across concurrent sessions and successive plans.
            status: in_progress
            sequence: 1
            features:
              plan-scoped-artifacts:
                id: plan-scoped-artifacts
                title: Plan-scoped artifacts + self-identifying ledger
                description: "Namespace scratch/reports by plan identity so a second
                  run doesn't read the previous plan's progress.md. PRs #1943, #1949,
                  #1938, #1905, #1858; issues #1936, #1816."
                status: in_progress
                sequence: 1
                docs_ref: https://github.com/obra/superpowers/pull/1943
              session-scoped-workspace:
                id: session-scoped-workspace
                title: Session-scoped workspace
                description: 'Session-scope the SDD workspace so concurrent sessions
                  on one checkout stop colliding — regression from #1780 (6.1.0).
                  PR #1952; issues #1942, #1888.'
                status: in_progress
                sequence: 2
                docs_ref: https://github.com/obra/superpowers/issues/1942
              artifact-pruning:
                id: artifact-pruning
                title: Scratch artifact pruning
                description: '.superpowers/sdd scratch artifacts are never pruned
                  and silently collide across efforts. Issue #1888.'
                status: todo
                sequence: 3
                docs_ref: https://github.com/obra/superpowers/issues/1888
            summary: "One underlying problem: SDD scratch under .superpowers/sdd collides
              and accumulates across efforts and across concurrent sessions on one
              checkout. Artifacts are keyed only by task-N (not by effort/plan), so
              a new plan's Task 1 clobbers the prior effort's task-1-report.md; progress.md
              ledger carries no plan identity so a second run skips the new plan's
              tasks; nothing prunes the dir."
            cluster: 'Issues: #1888 (never pruned + task-N clobber, glen-84), #1936
              (ledger no plan identity), #1942 (concurrent-session collision, regression
              of #1780), #975 (session storage defaults to working tree). Fix PRs:
              #1943, #1938, #1905, #1949, #1952.'
            signal: "AVOID as a contribution target: maintainer obra owns fix PR #1943
              (2026-07-06) and 4+ contributor PRs already compete here — high duplicate-rejection
              risk. Community flagged 'pretty severe'."
            context_captured: 2026-07-10 from issue bodies + cross-reference
              timeline
          dispatch-intelligence:
            id: dispatch-intelligence
            title: Dispatch intelligence
            description: Match dispatch decisions (inline vs fan-out, effort
              level, token spend) to task size and complexity.
            status: in_progress
            sequence: 2
            features:
              reasoning-effort-dimension:
                id: reasoning-effort-dimension
                title: Per-task reasoning-effort dimension
                description: 'SDD subagents run at session effort regardless of task
                  complexity; add an effort dimension to dispatch. PR #1948, issue
                  #1747.'
                status: in_progress
                sequence: 1
                docs_ref: https://github.com/obra/superpowers/pull/1948
              inline-vs-fanout-threshold:
                id: inline-vs-fanout-threshold
                title: Inline-vs-fan-out threshold
                description: "Small, tightly-coupled changes pay fan-out overhead
                  for isolation they don't need; bias toward inline / Workflow fan-outs
                  appropriately. Issues #1917, #1835, #1120, #1058, #995."
                status: todo
                sequence: 2
                docs_ref: https://github.com/obra/superpowers/issues/1917
              token-budget-conservation:
                id: token-budget-conservation
                title: Token-budget conservation
                description: 'Reduce reviewer subagent verbosity and runaway token
                  usage; a simple plan can consume a full 5h budget. Issues #1930,
                  #1152, #1194.'
                status: todo
                sequence: 3
                docs_ref: https://github.com/obra/superpowers/issues/1152
            summary: "SDD dispatches every subagent at session-level effort/model
              and always fans out, so cost/latency don't match task complexity. Three
              axes: no reasoning-effort dial per role (#1747), no inline-vs-fanout
              threshold for small tightly-coupled changes (#1917), review runs even
              for 'easy' tasks (#1120)."
            cluster: 'Open issues #1747 (effort dimension), #1917 (inline-vs-dispatch
              threshold), #1120 (skip reviews for easy tasks). Open PR #1948 (gborges0727,
              community) implements #1747. No obra-authored fix PR. #1917 has NO PR
              yet.'
            signal: "MIXED. #1747 CONTESTED-lite: open community PR #1948 already
              implements it — don't duplicate. #1917 inline-vs-fanout threshold is
              TARGET-CANDIDATE: open, no PR, docs-only routing note. Severity med
              (cost/latency, not correctness). No maintainer ownership."
            context_captured: '2026-07-10'
          review-integrity:
            id: review-integrity
            title: Review integrity
            description: 'Make in-loop review real: no phantom completion, no fabricated
              dialogues, allowlist-friendly review-package, safe parallel dispatch.'
            status: in_progress
            sequence: 3
            features:
              task-scoped-review:
                id: task-scoped-review
                title: Task-scoped review dispatch
                description: 'Single task reviewer + review-package script, eval-tuned;
                  cost-tiering + pre-flight plan review. PRs #1717, #1744.'
                status: done
                sequence: 1
                docs_ref: https://github.com/obra/superpowers/pull/1717
              review-package-cwd:
                id: review-package-cwd
                title: review-package cwd/allowlisting
                description: "Add -C DIR flag so review-package stops forcing an un-allowlistable
                  'cd <repo>; review-package' compound. PR #1809, issue #1799."
                status: in_progress
                sequence: 2
                docs_ref: https://github.com/obra/superpowers/pull/1809
              phantom-completion-guard:
                id: phantom-completion-guard
                title: Phantom-completion guard
                description: 'Reviewer concurs on unchanged tree when implementer
                  no-ops; orchestrator fabricates subagent dialogues; hard-gate review
                  skipping. Issues #1701, #1749, #463; PR #613.'
                status: todo
                sequence: 3
                docs_ref: https://github.com/obra/superpowers/issues/1749
              parallel-dispatch-isolation:
                id: parallel-dispatch-isolation
                title: Parallel dispatch with worktree isolation
                description: 'Allow parallel dispatch with worktree isolation; persistent
                  validator pool (Team Mode). PRs #1534, #578.'
                status: in_progress
                sequence: 4
                docs_ref: https://github.com/obra/superpowers/pull/1534
            summary: "SDD review gate can be bypassed or faked: controller skips reviewer
              dispatch (#463), reviewer concurs on an unchanged tree when implementer
              silently no-ops (#1701), orchestrator fabricates entire subagent dialogues
              without calling the Agent tool (#1749). A correctness/integrity hole
              ('phantom completion')."
            cluster: 'Shipped: #1717 & #1744 merged by obra (task-scoped review +
              cost-tiering). Open issues #463, #1701 (theoju), #1749 (wokito). Open
              PRs (none by obra): #578 (STRML, phantom-completion + validator pool),
              #613 (philippevezina, hard gates), #1809 (citizen204, review-package
              -C DIR), #1534 (xuefei-wang, parallel dispatch).'
            signal: 'CONTESTED — core review-skip/phantom-completion fix has ≥2 competing
              open community PRs (#578, #613), none maintainer-owned. High severity
              (correctness). AVOID re-solving review-skipping; #1749 (fabricated dispatch)
              has an open issue but no PR — possible narrow TARGET but overlaps #578.'
            context_captured: '2026-07-10'
      s3:
        id: s3
        title: 'S3: Planning & Brainstorming Quality'
        description: Sharpen the up-front skills — brainstorming, writing-plans,
          writing-skills — so specs and plans are grounded, robust to long runs,
          and leave room for executor judgment.
        status: in_progress
        sequence: 3
        success_criteria:
          - Brainstorming recommendations grounded in named evidence
          - Long plans write incrementally without watchdog stalls
          - Skill guidance keyed to standards, not arbitrary counts
        projects:
          brainstorming:
            id: brainstorming
            title: Brainstorming
            description: Visual companion, question routing, grounded
              recommendations, and output-path hygiene.
            status: in_progress
            sequence: 1
            features:
              visual-companion:
                id: visual-companion
                title: Visual companion hardening
                description: 'Harden/modernize the brainstorming visual companion
                  (auth, lifecycle, reconnect, WebSocket frame caps) + Alpine-driven
                  interactive rework. PRs #1720, #1555, #509, #1639.'
                status: done
                sequence: 1
                docs_ref: https://github.com/obra/superpowers/pull/1720
              askuserquestion-regression:
                id: askuserquestion-regression
                title: AskUserQuestion routing regression
                description: 'v6.0.0 platform-neutral reframe makes Claude Code overuse
                  AskUserQuestion / route conversational asks wrong (regression vs
                  5.1.0). Issue #1773, PR #1857, issue #1222.'
                status: todo
                sequence: 2
                docs_ref: https://github.com/obra/superpowers/issues/1773
              grounded-recommendations:
                id: grounded-recommendations
                title: Grounded recommendations
                description: 'Ground recommendations in named comparison dimensions/evidence,
                  not surface guesses; add research-existing-solutions step. PRs #1512,
                  #386; issues #1266, #983.'
                status: in_progress
                sequence: 3
                docs_ref: https://github.com/obra/superpowers/pull/1512
              brainstorm-output-paths:
                id: brainstorm-output-paths
                title: Output-path hygiene
                description: "Respect CLAUDE.md output paths; don't default session
                  storage to the working tree / leak plans into published docs. Issues
                  #939, #975, #1690."
                status: todo
                sequence: 4
                docs_ref: https://github.com/obra/superpowers/issues/939
              companion-security-hardening:
                id: companion-security-hardening
                title: 'Brainstorm companion: remove shell-exec injection shape'
                description: "server.cjs:540 shell-execs BRAINSTORM_OPEN_CMD via cp.exec(cmd
                  + url) — flagged High by an org security audit, blocking plugin
                  adoption. Fix: parse the command into argv and use cp.execFile (no
                  shell), matching the built-in launcher path two lines below. Issue
                  #1957 (mxcoder, filed 2026-07-11, unclaimed, 0 comments, no PR).
                  THIS FORK'S FIRST CONTRIBUTION TARGET."
                status: in_progress
                sequence: 5
                docs_ref:
                  docs/prds/PRD-001-brainstorm-companion-launcher-injection-shape.md,
                  docs/designs/DD-001-brainstorm-launcher-shell-free-argv.md,
                  docs/adr/ADR-001-brainstorm-launcher-shell-free-argv.md
            summary: 'Two live problem themes: (1) v6.0.0 platform-neutral bootstrap
              made Claude Code over-use AskUserQuestion for conversational asks (regression
              vs 5.1.0); (2) session/output storage ignores CLAUDE.md Output Paths
              and defaults into the working tree (docs/superpowers/), leaking internal
              specs into published docs. Visual-companion hardening already shipped.'
            cluster: 'Issues: #1773 (obra, AskUserQuestion regression); output-path
              dupes #939, #975, #1690. PRs: #1720 MERGED obra (visual companion);
              #1857 OPEN (mvanhorn, stop routing conversational asks); #1512 OPEN
              draft (j7an, ground recs in dimensions).'
            signal: 'CONTESTED (2 competing open PRs #1857,#1512 by non-maintainers)
              + maintainer-active: obra filed anchor regression #1773 and owns visual
              companion. Skill-content — eval evidence required, high bar. Output-path
              cluster (#939/#975/#1690) is unclaimed by PR = TARGET-CANDIDATE, high
              user severity.'
            context_captured: '2026-07-10'
          writing-plans:
            id: writing-plans
            title: Writing plans
            description: Robust long-plan authoring, spec traceability, review
              gates, and executor latitude.
            status: in_progress
            sequence: 2
            features:
              incremental-write-stall:
                id: incremental-write-stall
                title: Incremental write to avoid stall watchdog
                description: "Write plan file incrementally so xhigh-effort sessions
                  don't stall mid-stream against the 5-min watchdog. PR #1865; issues
                  #1860, #1947, #809, #1042."
                status: in_progress
                sequence: 1
                docs_ref: https://github.com/obra/superpowers/pull/1865
              spec-traceability:
                id: spec-traceability
                title: Spec→test traceability
                description: 'Optional Invariants / Global Constraints / Interfaces
                  + evidence summary for spec→test traceability. PRs #1831, #1808,
                  #1746, #1627.'
                status: in_progress
                sequence: 2
                docs_ref: https://github.com/obra/superpowers/pull/1831
              plan-review-gate:
